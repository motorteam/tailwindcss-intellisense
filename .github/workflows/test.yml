name: Build Verification

on:
  pull_request:

jobs:
  verify-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Run build script
        run: pnpm --filter vscode-tailwindcss build-for-motor

      - name: Check for differences
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Build script generated changes that weren't committed."
            echo "The following files have been modified:"
            git status --porcelain
            echo "Please run the build script locally and commit the changes."
            exit 1
          else
            echo "No differences found. Build verification passed!"
          fi
